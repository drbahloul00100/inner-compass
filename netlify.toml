[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Bundle the question bank JSON into the score function at build time
  # so it lives in the function's bundle (server-side only) and never
  # ships to the client.
  included_files = ["src/data/question-bank-v1.json"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Netlify will auto-install the Next.js plugin when deploying a Next.js site,
# but declaring it here makes the build deterministic and version-pinnable.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
